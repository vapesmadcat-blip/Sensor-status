name: Build and Deploy Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Adiciona o gatilho manual

jobs:
  build_android:
    runs-on: ubuntu-latest
    env:
      APK_PATH: ./build/app-preview.apk

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "PNPM_STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PNPM_STORE_PATH }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Install EAS CLI
      run: npm install -g eas-cli@latest

    - name: Build Android APK (Preview)
      run: |
        eas build --platform android --profile preview --non-interactive --wait --json > build-result.json
        BUILD_URL=$(jq -r '(if type=="array" then .[0] else . end | .artifacts.buildUrl // .artifacts.applicationArchiveUrl // empty)' build-result.json)
        if [ -z "$BUILD_URL" ]; then
          echo "Failed to resolve build artifact URL from EAS build JSON. Check build-result.json for the artifact field path."
          cat build-result.json
          exit 1
        fi
        mkdir -p ./build
        curl -fL --retry 3 --retry-all-errors "$BUILD_URL" -o "$APK_PATH"
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-preview-apk
        path: ${{ env.APK_PATH }}
        if-no-files-found: error
