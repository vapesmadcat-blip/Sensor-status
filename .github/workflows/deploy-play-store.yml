name: Build and Deploy to Google Play Store

on:
  push:
    branches:
      - main
    paths:
      - 'app.config.ts'
      - 'package.json'
  workflow_dispatch: # Gatilho manual

jobs:
  deploy_play_store:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "PNPM_STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PNPM_STORE_PATH }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Install EAS CLI
      run: pnpm install -g eas-cli

    - name: Login to Expo
      run: eas login --non-interactive
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    - name: Build Android App Bundle (AAB) for Play Store
      run: eas build --platform android --profile production --non-interactive

    - name: Setup Google Play Service Account
      run: |
        echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" > /tmp/service-account.json

    - name: Deploy to Google Play Store (Internal Testing)
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.app.locationhumiditycleaner
        releaseFiles: 'dist/**/*.aab'
        track: internal
        inAppUpdatePriority: 5
        status: completed

    - name: Notify Deployment Success
      if: success()
      run: echo "✅ App deployed to Google Play Store (Internal Testing Track)"

    - name: Notify Deployment Failure
      if: failure()
      run: echo "❌ Deployment to Google Play Store failed"
